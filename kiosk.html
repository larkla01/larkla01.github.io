<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KioskMeny</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container">
        <header>
            <div class="logo"><img src="./Bilder/last ned.png" alt=""></div>
            <div class="title">KioskMeny</div>
         <div class="home-icon"><img src="./Bilder/images.jpg" alt=""></div>
        </header>
        <div>
        
        <div class="kiosk-items">
            <div class="nav-buttons">
            <a href="index.html" class="nav-button home">Hjem</a>
        </div>
        
            <div class="kiosk-item">
            <img src="./Bilder/kaffe.jpg" alt="Kaffe" class="kiosk-item-image">
            <div class="kiosk-item-price">Kaffe 25KR</div>
            </div>
            
            <div class="kiosk-item">
            <img src="./Bilder/sjokolade.jpg" alt="Sjokolade" class="kiosk-item-image">
            <div class="kiosk-item-price">Sjokolade 20KR</div>

            <div class="kiosk-item">
                <img src="./Bilder/pølser.jpg" alt="Pølser" class="kiosk-item-image">
                <div class="kiosk-item-price">Pølser 30KR</div>
            </div>

            <div class="kiosk-item">
                <img src="./Bilder/baguette.jpg" alt="Baguette" class="kiosk-item-image">
                <div class="kiosk-item-price">Baguette 25KR</div>
            </div>
        </div>
    </div>
    
</body>
</html>
